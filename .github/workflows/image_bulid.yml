name: image
on:
  push:
    branches: [ main ]
jobs:
  container-test-job:
    runs-on: ubuntu-latest
    container:
      image: node:14.16
      env:
        NODE_ENV: development
      ports:
        - 80
      volumes:
        - image_volumes:/etc
      options: --cpus 1
    steps:
      - name: Check for dockerenv file
        run: (ls / && ls && pwd && ls image_volumes && echo Found etc) || (echo No dockerenv)
